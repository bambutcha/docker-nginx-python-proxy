name: docker-nginx-python-proxy

services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    container_name: em-backend
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    container_name: em-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  app:
    name: em-app
